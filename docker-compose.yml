version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: coup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
